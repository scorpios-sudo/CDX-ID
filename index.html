<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Trader X Academy · Pips Profit Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, color 0.2s, border 0.2s;
        }

        body {
            background-color: #0A0C10;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
            color: #EFF3F8;
            padding-bottom: 72px;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1E2229; }
        ::-webkit-scrollbar-thumb { background: #2E3A45; border-radius: 8px; }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background-color: var(--bg-primary, #0A0C10);
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .app-header {
            padding: 20px 16px 8px 16px;
            border-bottom: 1px solid var(--border-color, #1E2229);
            background: var(--bg-primary, #0A0C10);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .app-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .app-header p { font-size: 0.7rem; color: #FFD966; margin-top: 4px; letter-spacing: 0.5px; }

        /* bottom nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: var(--nav-bg, #0F1219);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-around;
            padding: 10px 8px 18px;
            border-top: 1px solid var(--border-color, #232730);
            z-index: 20;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: #8E9AAB;
            font-size: 0.65rem;
            font-weight: 500;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 40px;
        }
        .nav-item.active {
            color: #FFB347;
            background: rgba(255, 180, 71, 0.15);
        }
        .nav-icon { font-size: 1.4rem; }
        .main-content { padding: 16px; }

        /* cards */
        .card {
            background: var(--card-bg, #12161C);
            border-radius: 28px;
            padding: 18px 16px;
            margin-bottom: 18px;
            border: 1px solid var(--border-color, #20242C);
            box-shadow: 0 6px 14px rgba(0,0,0,0.25);
        }
        .card-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: #FFB347;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFF, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .win-text { color: #2ECC71; }
        .loss-text { color: #E74C3C; }
        .btn-primary {
            background: linear-gradient(95deg, #FFB347, #FF8C00);
            border: none;
            color: #0A0C10;
            font-weight: 800;
            padding: 10px 18px;
            border-radius: 60px;
            font-size: 0.85rem;
            cursor: pointer;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 6px rgba(255,140,0,0.3);
        }
        .btn-secondary {
            background: #1E293B;
            color: #FFD966;
            border: 1px solid #FFB34740;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #FFB347;
            color: #FFB347;
        }
        .row-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }
        hr { border-color: #2A3140; margin: 14px 0; }
        .signal-item {
            background: #0F151E;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #FFB347;
        }
        .master-card {
            background: #0F151E;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge-profit { background: #2ECC6E20; color: #2ECC6E; border-radius: 40px; padding: 4px 12px; font-size: 0.7rem; font-weight: bold; }
        .empty-state { text-align: center; padding: 30px 16px; color: #8E9AAB; }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-content {
            background: var(--card-bg, #12161C);
            max-width: 340px;
            width: 90%;
            border-radius: 36px;
            padding: 24px 20px;
            border: 1px solid #FFB34750;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            background: #1A2028;
            border: 1px solid #2F3845;
            border-radius: 28px;
            color: white;
            margin: 12px 0;
        }
        .flex-buttons { display: flex; gap: 12px; margin-top: 16px; }
        .theme-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: #1A1F28;
            border-radius: 60px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .theme-option.selected { border-color: #FFB347; background: rgba(255,180,71,0.1); }
        .theme-color { width: 28px; height: 28px; border-radius: 28px; }
        .trade-item {
            background: #0F141C;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #FFB347;
        }
        .trade-win { border-left-color: #2ECC71; }
        .trade-loss { border-left-color: #E74C3C; }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
            margin-top: 12px;
        }
        .cal-day {
            background: #10141C;
            padding: 8px 4px;
            border-radius: 40px;
            font-size: 0.8rem;
        }
        .cal-day.profit { background: #2ECC6E20; color: #2ECC6E; border: 1px solid #2ECC6E40; }
        .cal-day.loss { background: #E74C3C20; color: #E74C3C; border: 1px solid #E74C3C40; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <h1>Trader X Academy</h1>
        <p>⚡ Pips Profit · Copy & Journal</p>
    </div>
    <div class="main-content" id="mainContent">Memuat...</div>
    <div class="bottom-nav">
        <button class="nav-item" data-tab="home"><span class="nav-icon">📈</span><span>Home</span></button>
        <button class="nav-item" data-tab="journal"><span class="nav-icon">📓</span><span>Journal</span></button>
        <button class="nav-item" data-tab="signals"><span class="nav-icon">📡</span><span>Signals</span></button>
        <button class="nav-item" data-tab="calendar"><span class="nav-icon">📅</span><span>Calendar</span></button>
        <button class="nav-item" data-tab="accounts"><span class="nav-icon">👤</span><span>Profile</span></button>
    </div>
</div>

<!-- Modal Trade -->
<div id="tradeModal" class="modal-overlay"><div class="modal-content"><h3>➕ New Trade (Pips)</h3><input type="text" id="tradeSymbol" placeholder="Pair / Asset" value="EUR/USD"><input type="date" id="tradeDate" value="2026-04-03"><input type="number" id="tradePnL" placeholder="Profit / Loss (USD)" step="any" value="0"><div class="flex-buttons"><button id="saveTradeBtn" class="btn-primary btn-small">Save Trade</button><button id="closeTradeModal" class="btn-secondary btn-small">Cancel</button></div></div></div>
<div id="setupModal" class="modal-overlay"><div class="modal-content"><h3>📌 New Trade Setup</h3><input type="text" id="setupName" placeholder="Strategy name"><textarea id="setupDesc" placeholder="Description" rows="2"></textarea><div class="flex-buttons"><button id="saveSetupBtn" class="btn-primary btn-small">Create</button><button id="closeSetupModal" class="btn-secondary btn-small">Cancel</button></div></div></div>

<script>
    // Data utama
    let appData = {
        trades: [],
        tradeSetups: [],
        accounts: [{ id: Date.now(), name: "PipsMaster", broker: "Prop Firm" }],
        followedMasters: [1], // id master yg diikuti
        copiedSignals: [] // sinyal dari master yang di-copy
    };

    // Master traders (simulasi Pips Profit)
    const masterTraders = [
        { id: 1, name: "AlphaSeeker", totalProfit: 12450, winRate: 78, followers: 342, avatar: "🐺", roi: 42.5 },
        { id: 2, name: "CryptoKing", totalProfit: 8920, winRate: 68, followers: 189, avatar: "👑", roi: 31.2 },
        { id: 3, name: "ForexGhost", totalProfit: 21300, winRate: 82, followers: 1050, avatar: "👻", roi: 67.8 }
    ];

    let activeTab = 'home';
    let currentTheme = 'neon-mint';
    const themes = {
        'pips-gold': { name: 'Pips Gold', accent: '#FFB347', bg: '#0D0A05', card: '#17130C', border: '#3E2E1A' },
        'neon-mint': { name: 'Neon Mint', accent: '#00D09C', bg: '#0A0C10', card: '#12161C', border: '#20242C' },
        'electric-violet': { name: 'Electric Violet', accent: '#B567FF', bg: '#0A0418', card: '#14102A', border: '#2E2350' },
        'ocean-blue': { name: 'Ocean Blue', accent: '#2D9CDB', bg: '#0A1927', card: '#0E2433', border: '#1D4E6E' },
    };

    function applyTheme(themeId) {
        const t = themes[themeId];
        if (!t) return;
        currentTheme = themeId;
        document.documentElement.style.setProperty('--accent', t.accent);
        document.documentElement.style.setProperty('--bg-primary', t.bg);
        document.documentElement.style.setProperty('--card-bg', t.card);
        document.documentElement.style.setProperty('--border-color', t.border);
        document.documentElement.style.setProperty('--nav-bg', t.card);
        localStorage.setItem('traderx_theme', themeId);
    }

    function loadTheme() { const saved = localStorage.getItem('traderx_theme'); if(saved && themes[saved]) applyTheme(saved); else applyTheme('pips-gold'); }

    function saveToLocal() { localStorage.setItem('TraderX_Jurnal', JSON.stringify({ trades: appData.trades, tradeSetups: appData.tradeSetups, accounts: appData.accounts, followedMasters: appData.followedMasters })); }
    function loadData() {
        const stored = localStorage.getItem('TraderX_Jurnal');
        if(stored) {
            try {
                const p = JSON.parse(stored);
                appData.trades = p.trades || [];
                appData.tradeSetups = p.tradeSetups || [];
                appData.accounts = p.accounts || [];
                appData.followedMasters = p.followedMasters || [];
            } catch(e) {}
        }
        if(appData.accounts.length === 0) appData.accounts.push({ id: Date.now(), name: "PipsMaster", broker: "FTMO" });
        if(!appData.followedMasters) appData.followedMasters = [1];
        saveToLocal();
    }

    function computeStats() {
        const trades = appData.trades;
        const wins = trades.filter(t => t.pnl > 0);
        const losses = trades.filter(t => t.pnl < 0);
        const totalPnl = trades.reduce((s,t)=> s+t.pnl,0);
        const grossProfit = wins.reduce((s,w)=> s+w.pnl,0);
        const grossLoss = Math.abs(losses.reduce((s,l)=> s+l.pnl,0));
        const profitFactor = grossLoss === 0 ? (grossProfit>0?grossProfit:0) : grossProfit/grossLoss;
        const winRate = wins.length+losses.length === 0 ? 0 : (wins.length/(wins.length+losses.length)*100);
        const totalDeposit = 10000; // asumsi deposit awal
        const roi = totalDeposit > 0 ? (totalPnl / totalDeposit) * 100 : 0;
        const maxDrawdown = computeDrawdown(trades);
        return { totalPnl, winRate, tradesCount: trades.length, profitFactor, winsCount: wins.length, lossesCount: losses.length, roi, maxDrawdown, bestTrade: trades.length?Math.max(...trades.map(t=>t.pnl)):0, worstTrade: trades.length?Math.min(...trades.map(t=>t.pnl)):0 };
    }
    function computeDrawdown(trades) {
        let peak = 0, drawdown = 0;
        let running = 0;
        for(let t of trades) {
            running += t.pnl;
            if(running > peak) peak = running;
            let dd = peak - running;
            if(dd > drawdown) drawdown = dd;
        }
        return drawdown;
    }
    function getSignalsFromMasters() {
        // sinyal dari master yang diikuti (simulasi)
        let signals = [];
        if(appData.followedMasters.includes(1)) signals.push({ master: "AlphaSeeker", pair: "EUR/USD", direction: "BUY", entry: 1.0920, tp: 1.0980, sl: 1.0880, time: "10:24", profit: "+42 pips" });
        if(appData.followedMasters.includes(2)) signals.push({ master: "CryptoKing", pair: "BTC/USD", direction: "SELL", entry: 68500, tp: 67000, sl: 69500, time: "09:15", profit: "active" });
        if(appData.followedMasters.includes(3)) signals.push({ master: "ForexGhost", pair: "GBP/JPY", direction: "BUY", entry: 192.40, tp: 193.80, sl: 191.50, time: "08:00", profit: "+28 pips" });
        if(signals.length === 0) signals.push({ master: "System", text: "Follow master traders to see live signals", profit: "info" });
        return signals;
    }

    // RENDER HOME (dashboard dengan metrik Pips Profit)
    function renderHome() {
        const stats = computeStats();
        const html = `
            <div class="card"><div class="card-title">💼 EQUITY & ROI</div><div class="stat-value">$${stats.totalPnl.toFixed(2)}</div><div>ROI: ${stats.roi.toFixed(1)}%  |  Max DD: $${stats.maxDrawdown.toFixed(2)}</div><div class="row-flex"><span>Win Rate: ${stats.winRate.toFixed(0)}%</span><span>Profit Factor: ${stats.profitFactor.toFixed(2)}</span></div></div>
            <div class="stat-grid"><div class="card"><div class="stat-value">${stats.tradesCount}</div><div>Total Trades</div></div><div class="card"><div class="stat-value">${stats.winsCount}</div><div>Wins</div></div><div class="card"><div class="stat-value">${stats.lossesCount}</div><div>Losses</div></div><div class="card"><div class="stat-value">${stats.winRate.toFixed(0)}%</div><div>Win rate</div></div></div>
            <div class="card"><div class="card-title">📊 TOP MASTERS (Copy Pips)</div>${masterTraders.map(m => `<div class="master-card"><div><span style="font-size:1.4rem">${m.avatar}</span> <strong>${m.name}</strong><div style="font-size:0.7rem">ROI ${m.roi}% · Win ${m.winRate}%</div></div><div><span class="badge-profit">+$${m.totalProfit}</span><button class="follow-master btn-secondary btn-small" data-id="${m.id}" style="margin-left:12px; padding:4px 12px;">${appData.followedMasters.includes(m.id) ? '✅ Following' : 'Follow'}</button></div></div>`).join('')}</div>
            <div class="card"><div class="card-title">⚡ LIVE SIGNALS (Copied)</div>${getSignalsFromMasters().map(s => `<div class="signal-item"><div>📡 ${s.master} · ${s.pair} ${s.direction || ''} @${s.entry || ''}<br><span style="font-size:0.7rem">TP ${s.tp || ''} SL ${s.sl || ''}</span></div><div class="win-text">${s.profit}</div></div>`).join('')}<button id="refreshSignalsHome" class="btn-secondary btn-small" style="margin-top:8px;">🔄 Refresh Signals</button></div>
            <button class="btn-primary" id="fabNewTradeHome">+ New Trade (Pips)</button>
        `;
        document.getElementById('mainContent').innerHTML = html;
        document.getElementById('fabNewTradeHome')?.addEventListener('click', openTradeModal);
        document.querySelectorAll('.follow-master').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                if(appData.followedMasters.includes(id)) appData.followedMasters = appData.followedMasters.filter(i => i !== id);
                else appData.followedMasters.push(id);
                saveToLocal();
                renderHome();
            });
        });
        document.getElementById('refreshSignalsHome')?.addEventListener('click', () => { renderHome(); });
    }

    function renderJournal() {
        const trades = appData.trades;
        const html = `<div class="card"><div class="card-title">📓 Journal · ${trades.length} trades logged</div>${trades.length === 0 ? `<div class="empty-state">📭 Belum ada trade. Klik +New Trade</div>` : trades.map(t => `<div class="trade-item ${t.pnl>0 ? 'trade-win' : 'trade-loss'}"><div><strong>${t.symbol}</strong> | ${t.date}</div><div>P&L: <span class="${t.pnl>=0?'win-text':'loss-text'}">$${t.pnl.toFixed(2)}</span></div><button class="delete-trade btn-small btn-secondary" data-id="${t.id}" style="margin-top:6px;">Hapus</button></div>`).join('')}</div>`;
        document.getElementById('mainContent').innerHTML = html;
        if(appData.trades.length === 0) {
            const btn = document.createElement('button'); btn.className = 'btn-primary'; btn.innerText = '+ New Trade'; btn.style.marginTop='12px'; btn.addEventListener('click', openTradeModal);
            document.getElementById('mainContent').appendChild(btn);
        }
        document.querySelectorAll('.delete-trade').forEach(btn => {
            btn.addEventListener('click', () => { const id = parseInt(btn.dataset.id); appData.trades = appData.trades.filter(t => t.id !== id); saveToLocal(); renderJournal(); });
        });
    }

    function renderSignals() {
        const signals = getSignalsFromMasters();
        const html = `<div class="card"><div class="card-title">📡 COPY TRADING · Pips Profit</div><div>Master Traders yang diikuti: ${appData.followedMasters.length} orang</div><hr>${signals.map(s => `<div class="signal-item" style="border-left-color:#FFB347"><div>🔔 <strong>${s.master}</strong> · ${s.pair || 'Signal'}</div><div>${s.direction ? `Entry: ${s.entry} | TP ${s.tp} | SL ${s.sl}` : s.text}</div><div class="win-text">${s.profit}</div><div><button class="btn-small btn-outline copy-this-signal" style="margin-top:6px;">Copy Trade (Simulate)</button></div></div>`).join('')}</div><div class="card"><div class="card-title">🤝 MASTER TRADER RANK</div>${masterTraders.map(m => `<div class="master-card"><div><b>${m.avatar} ${m.name}</b> <span style="font-size:0.7rem">ROI ${m.roi}% · Win ${m.winRate}%</span></div><div><span class="badge-profit">+$${m.totalProfit}</span><button class="follow-master-signal btn-small btn-secondary" data-id="${m.id}">${appData.followedMasters.includes(m.id)? 'Unfollow' : 'Follow'}</button></div></div>`).join('')}</div>`;
        document.getElementById('mainContent').innerHTML = html;
        document.querySelectorAll('.follow-master-signal').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                if(appData.followedMasters.includes(id)) appData.followedMasters = appData.followedMasters.filter(i => i !== id);
                else appData.followedMasters.push(id);
                saveToLocal();
                renderSignals();
            });
        });
        document.querySelectorAll('.copy-this-signal').forEach(btn => {
            btn.addEventListener('click', () => alert("Simulasi copy trade: posisi dibuka di akun demo. (Fitur Premium Pips Profit)"));
        });
    }

    function renderCalendar() {
        const stats = computeStats();
        const year=2026, month=3;
        const firstDay = new Date(year,month,1).getDay();
        const daysInMonth = new Date(year,month+1,0).getDate();
        let calendarDays = [];
        for(let i=0;i<firstDay;i++) calendarDays.push(null);
        for(let d=1;d<=daysInMonth;d++) calendarDays.push(d);
        const tradesByDate = {};
        appData.trades.forEach(t => { if(t.date.startsWith('2026-04')) tradesByDate[t.date.slice(8)] = (tradesByDate[t.date.slice(8)] || 0) + t.pnl; });
        const html = `<div class="card"><div class="card-title">📅 April 2026 · P&L</div><div class="stat-value ${stats.totalPnl>=0?'win-text':'loss-text'}">${stats.totalPnl>=0?'+':''}$${stats.totalPnl.toFixed(2)}</div><div class="calendar-grid">${['S','M','T','W','T','F','S'].map(d=>`<div style="color:#FFB347">${d}</div>`).join('')}${calendarDays.map(day => { if(day===null) return `<div class="cal-day"></div>`; const pnlDay = tradesByDate[day.toString().padStart(2,'0')]||0; let cls = ''; if(pnlDay>0) cls='profit'; else if(pnlDay<0) cls='loss'; return `<div class="cal-day ${cls}">${day}</div>`; }).join('')}</div></div><div class="card"><div class="card-title">📈 Monthly Performance</div><div>Win streak: ${stats.winsCount>0?'🔥 '+stats.winsCount:'-'}</div></div>`;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderAccounts() {
        const stats = computeStats();
        const themeList = Object.keys(themes);
        const html = `
            <div class="card"><div class="card-title">👤 Trader Profile</div><div><strong>${appData.accounts[0]?.name || "Pips Trader"}</strong> · ${appData.accounts[0]?.broker || "Prop"}</div><div class="row-flex"><span>Total P&L</span><span class="${stats.totalPnl>=0?'win-text':'loss-text'}">$${stats.totalPnl.toFixed(2)}</span></div><div class="row-flex"><span>Win Rate</span><span>${stats.winRate.toFixed(0)}%</span></div><div class="row-flex"><span>Profit Factor</span><span>${stats.profitFactor.toFixed(2)}</span></div></div>
            <div class="card"><div class="card-title">🎨 Theme (Pips Style)</div>${themeList.map(key => { const t = themes[key]; const selected = currentTheme === key ? 'selected' : ''; return `<div class="theme-option ${selected}" data-theme="${key}"><div class="theme-color" style="background:${t.accent}"></div><div><strong>${t.name}</strong><br><span style="font-size:0.7rem">${key === 'pips-gold' ? 'Premium gold' : 'Modern'}</span></div></div>`; }).join('')}</div>
            <div class="card"><div class="card-title">💾 Backup & Support</div><div class="flex-buttons"><button id="exportBackupBtn" class="btn-small btn-primary">📤 Export</button><label for="importBackupInput" class="btn-small btn-secondary" style="cursor:pointer;">📂 Import</label><input type="file" id="importBackupInput" accept=".json" style="display:none"/></div><button id="resetDataBtn" class="btn-outline btn-small" style="margin-top:12px;">Reset Journal</button></div>
            <div class="card"><div class="card-title">⚙️ Pips Profit Features</div><div>✔ Copy Trading Signals<br>✔ Master Leaderboard<br>✔ ROI & Drawdown<br>✔ Cloud sync (coming)</div></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
        document.querySelectorAll('.theme-option').forEach(opt => { opt.addEventListener('click', () => { applyTheme(opt.dataset.theme); renderAccounts(); }); });
        document.getElementById('exportBackupBtn')?.addEventListener('click', () => { const dataStr = JSON.stringify(appData); const blob = new Blob([dataStr], {type:"application/json"}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`traderx_backup.json`; a.click(); URL.revokeObjectURL(url); });
        const fileInput = document.getElementById('importBackupInput');
        fileInput?.addEventListener('change', (e) => { if(e.target.files[0]) { const reader = new FileReader(); reader.onload = (ev) => { try { const imported = JSON.parse(ev.target.result); if(imported.trades !== undefined) { appData = imported; saveToLocal(); alert("Restore success!"); render(); } else alert("Invalid file"); } catch(err) { alert("Error"); } }; reader.readAsText(e.target.files[0]); } });
        document.getElementById('resetDataBtn')?.addEventListener('click', () => { if(confirm("Reset semua data trading?")) { appData.trades = []; appData.tradeSetups = []; appData.followedMasters = [1]; saveToLocal(); render(); } });
    }

    function openTradeModal() { 
        const modal = document.getElementById('tradeModal'); 
        modal.classList.add('active'); 
        document.getElementById('saveTradeBtn').onclick = () => { 
            const symbol = document.getElementById('tradeSymbol').value.trim() || "Unknown"; 
            const date = document.getElementById('tradeDate').value; 
            const pnl = parseFloat(document.getElementById('tradePnL').value); 
            if(isNaN(pnl)) return; 
            appData.trades.push({ id: Date.now(), symbol, date, pnl }); 
            saveToLocal(); 
            modal.classList.remove('active'); 
            render(); 
        }; 
        document.getElementById('closeTradeModal').onclick = () => modal.classList.remove('active'); 
    }

    function render() {
        if(activeTab === 'home') renderHome();
        else if(activeTab === 'journal') renderJournal();
        else if(activeTab === 'signals') renderSignals();
        else if(activeTab === 'calendar') renderCalendar();
        else if(activeTab === 'accounts') renderAccounts();
        document.querySelectorAll('.nav-item').forEach(btn => { if(btn.dataset.tab === activeTab) btn.classList.add('active'); else btn.classList.remove('active'); });
    }

    function initNavigation() { document.querySelectorAll('.nav-item').forEach(btn => { btn.addEventListener('click', () => { activeTab = btn.dataset.tab; render(); }); }); window.openTradeModal = openTradeModal; }
    loadTheme();
    loadData();
    initNavigation();
    render();
</script>
</body>
</html>
